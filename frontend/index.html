  <style>
    /* Inline styles for the critical loader */
    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    #loader-wrapper.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .loader-content {
      text-align: center;
    }

    .loader-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #1a4d7c;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #e8f4f8;
      border-top: 5px solid #1a4d7c;
      border-right: 5px solid #4b9560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
